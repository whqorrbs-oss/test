<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Loan AI Hub | 스마트 대출 상담</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Calculator Section -->
        <aside class="calculator-panel">
            <div class="panel-header">
                <h2><i class="bi bi-calculator"></i> 대출 계산기</h2>
                <p>월 상환액을 미리 확인해보세요.</p>
            </div>
            <div class="calc-form">
                <div class="input-group">
                    <label>대출 금액 (만원)</label>
                    <input type="number" id="loanAmount" placeholder="예: 5000" value="10000">
                </div>
                <div class="input-group">
                    <label>대출 금리 (%)</label>
                    <input type="number" id="loanRate" step="0.1" placeholder="예: 3.5" value="4.5">
                </div>
                <div class="input-group">
                    <label>대출 기간 (년)</label>
                    <input type="number" id="loanTerm" placeholder="예: 30" value="30">
                </div>
                <div class="input-group">
                    <label>상환 방식</label>
                    <select id="repayMethod">
                        <option value="level">원리금균등상환</option>
                        <option value="principal">원금균등상환</option>
                    </select>
                </div>
                <button id="calcBtn" class="primary-btn">계산하기</button>
            </div>
            <div id="calcResult" class="calc-result" style="display: none;">
                <div class="result-item">
                    <span>월 평균 상환액</span>
                    <strong id="monthlyPayment">0원</strong>
                </div>
                <div class="result-item">
                    <span>총 이자 합계</span>
                    <strong id="totalInterest">0원</strong>
                </div>
            </div>
        </aside>

        <!-- Main Chat Section -->
        <main class="chat-panel">
            <header class="chat-header">
                <div class="header-info">
                    <h1>K-Loan AI 상담사</h1>
                    <span class="status-badge"><span class="dot"></span> 실시간 상담 가능</span>
                </div>
                <button id="theme-toggle-btn" class="icon-btn"><i class="bi bi-moon-stars"></i></button>
            </header>

            <div id="chatMessages" class="chat-messages">
                <div class="message ai">
                    <div class="bubble">
                        안녕하세요! 한국 금융 정책과 대출 상품에 정통한 **K-Loan AI 상담사**입니다. 
                        전세자금대출, 주택담보대출, 또는 디딤돌/버팀목 같은 정책 자금에 대해 궁금한 점이 있으신가요?
                    </div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="chip">🏠 디딤돌 대출 자격</button>
                <button class="chip">🏢 전세버팀목 안내</button>
                <button class="chip">📉 현재 금리 추이</button>
                <button class="chip">🔍 LTV/DSR이 뭐야?</button>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="대출에 대해 무엇이든 물어보세요...">
                    <button id="sendBtn" class="icon-btn send"><i class="bi bi-send-fill"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
