<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Loan AI Hub | 스마트 대출 상담</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Limit Diagnostic Section -->
        <aside class="calculator-panel">
            <div class="panel-header">
                <h2><i class="bi bi-shield-check"></i> 대출 한도 진단</h2>
                <p>LTV/DSR 규제 기반 한도를 추정합니다.</p>
            </div>
            <div class="calc-form">
                <div class="input-group">
                    <label>담보 대상 (단지명/주소)</label>
                    <div class="search-wrapper">
                        <input type="text" id="propertySearch" placeholder="예: 헬리오시티, 반포자이">
                        <div id="searchResults" class="search-results" style="display: none;"></div>
                    </div>
                </div>
                <div id="selectedProperty" class="selected-property-card" style="display: none;">
                    <span id="propName">-</span>
                    <strong id="propPrice">0원 (KB시세 기준)</strong>
                </div>
                <div class="input-group">
                    <label>연소득 (만원)</label>
                    <input type="number" id="annualIncome" placeholder="예: 6000" value="6000">
                </div>
                <div class="input-group">
                    <label>기존 대출 연간 원리금 상환액 (만원)</label>
                    <input type="number" id="existingDebt" placeholder="예: 0" value="0">
                </div>
                <div class="input-group">
                    <label>주택 보유 수</label>
                    <select id="houseCount">
                        <option value="0">무주택 (LTV 70%)</option>
                        <option value="1">1주택 (LTV 60%)</option>
                        <option value="2">2주택 이상 (LTV 0~30%)</option>
                    </select>
                </div>
                <button id="calcLimitBtn" class="primary-btn">한도 확인하기</button>
            </div>
            <div id="limitResult" class="calc-result" style="display: none;">
                <div class="result-header">추정 최대 한도</div>
                <div class="main-limit" id="maxLoanAmount">0원</div>
                <div class="limit-details">
                    <div class="detail-item">
                        <span>LTV 제한 금액</span>
                        <span id="ltvLimit">0원</span>
                    </div>
                    <div class="detail-item">
                        <span>DSR 제한 금액</span>
                        <span id="dsrLimit">0원</span>
                    </div>
                </div>
                <p class="limit-info">* 실제 한도는 은행 심사에 따라 달라질 수 있습니다.</p>
            </div>
        </aside>

        <!-- Main Chat Section -->
        <main class="chat-panel">
            <header class="chat-header">
                <div class="header-info">
                    <h1>K-Loan AI 상담사</h1>
                    <span class="status-badge"><span class="dot"></span> 실시간 상담 가능</span>
                </div>
                <button id="theme-toggle-btn" class="icon-btn"><i class="bi bi-moon-stars"></i></button>
            </header>

            <div id="chatMessages" class="chat-messages">
                <div class="message ai">
                    <div class="bubble">
                        안녕하세요! 한국 금융 정책과 대출 상품에 정통한 **K-Loan AI 상담사**입니다. 
                        전세자금대출, 주택담보대출, 또는 디딤돌/버팀목 같은 정책 자금에 대해 궁금한 점이 있으신가요?
                    </div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="chip">🏠 디딤돌 대출 자격</button>
                <button class="chip">🏢 전세버팀목 안내</button>
                <button class="chip">💼 개인사업자 대출</button>
                <button class="chip">🏢 법인 대출 상담</button>
                <button class="chip">🔍 LTV/DSR이 뭐야?</button>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="대출에 대해 무엇이든 물어보세요...">
                    <button id="sendBtn" class="icon-btn send"><i class="bi bi-send-fill"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
