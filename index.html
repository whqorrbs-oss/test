<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Loan AI Hub | 스마트 대출 한도 진단</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <div class="app-container chat-only">
        <!-- Main Chat Section (Full Width) -->
        <main class="chat-panel">
            <header class="chat-header">
                <div class="header-info">
                    <h1>K-Loan AI 상담사</h1>
                    <span class="status-badge"><span class="dot"></span> 1:1 한도 진단 중</span>
                </div>
                <button id="theme-toggle-btn" class="icon-btn"><i class="bi bi-moon-stars"></i></button>
            </header>

            <div id="chatMessages" class="chat-messages">
                <!-- Messages and Options will be injected here -->
            </div>

            <div id="quickActions" class="quick-actions">
                <!-- Dynamic Action Buttons (Chips) will appear here -->
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="메시지를 입력하거나 아래 버튼을 눌러주세요...">
                    <button id="sendBtn" class="icon-btn send"><i class="bi bi-send-fill"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
